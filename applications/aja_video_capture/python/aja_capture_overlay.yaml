---
aja:
  width: 3840
  height: 2160
  framerate: 59
  rdma: false
  enable_overlay: true
  overlay_rdma: false

holoviz:
  window_title: "Directly from aja_source"
  width: 3840
  height: 2160
  
holoviz_to_videobuffer:
  window_title: "Tensor to videobuffer"
  width: 3840
  height: 2160
  enable_render_buffer_output: true
  headless: false
  tensors:
    - name: "circle"
      type: color
      opacity: 1.0
      priority: 0

holoviz_aja_consumer:
  window_title: "Overlay generated by aja"
  width: 3840
  height: 2160

circle_generator:
  out_tensor_name: "circle"
  width: 3840 
  height: 2160
  radius: 100
  center_x: 960
  center_y: 540
  color: [255, 0, 0, 127]